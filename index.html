<!DOCTYPE html>
<html>
<head>
<title>Ludo Stable Final</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  gap:20px;
}

.wrapper{ position:relative; }

#board{
  display:grid;
  grid-template-columns:repeat(15,40px);
  grid-template-rows:repeat(15,40px);
}

.cell{
  width:40px;height:40px;
  border:1px solid #333;
  background:#eee;
}

.center{background:#222;}

.token{
  width:22px;height:22px;
  border-radius:50%;
  position:absolute;
  border:2px solid white;
  cursor:pointer;
}

.panel{color:white;}
</style>
</head>

<body>

<div class="wrapper">
  <div id="board"></div>
</div>

<div class="panel">
  <button onclick="rollDice()">🎲 Roll</button>
  <h2 id="dice">-</h2>
  <h3 id="turn">Player 1</h3>
</div>

<script>

const board=document.getElementById("board")
const diceEl=document.getElementById("dice")
const turnEl=document.getElementById("turn")

const PLAYER_TYPES=["human","ai","human","ai"]

// -------- BOARD --------
for(let r=0;r<15;r++){
 for(let c=0;c<15;c++){
  let d=document.createElement("div")
  d.className="cell"
  if(r>=6&&r<=8&&c>=6&&c<=8) d.classList.add("center")
  board.appendChild(d)
 }
}

// -------- TRACK --------
const TRACK=[
[6,1],[6,2],[6,3],[6,4],[6,5],[5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
[0,7],[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[6,9],[6,10],[6,11],[6,12],[6,13],[6,14],
[7,14],[8,14],[8,13],[8,12],[8,11],[8,10],[8,9],
[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],
[14,7],[14,6],[13,6],[12,6],[11,6],[10,6],[9,6],
[8,5],[8,4],[8,3],[8,2],[8,1],[8,0],
[7,0],[6,0]
]

const START=[0,13,26,39]

function px(r,c){return[c*40+9,r*40+9]}

// -------- TOKENS --------
let ALL_TOKENS=[]

class Token{
 constructor(p,x,y,color){
  this.p=p
  this.pos=-1

  this.el=document.createElement("div")
  this.el.className="token"
  this.el.style.background=color
  document.querySelector(".wrapper").appendChild(this.el)

  this.start=[x,y]
  this.update()

  this.el.onclick=()=>move(this,false)

  ALL_TOKENS.push(this)
 }

 update(){
  if(this.pos===-1){
    this.el.style.left=this.start[0]+"px"
    this.el.style.top=this.start[1]+"px"
  }else{
    let [r,c]=TRACK[this.pos]
    let [x,y]=px(r,c)
    this.el.style.left=x+"px"
    this.el.style.top=y+"px"
  }
 }
}

// -------- GAME --------
const game={players:[],turn:0,dice:0}

function makePlayer(p,color,[x,y]){
 let arr=[]
 for(let i=0;i<4;i++){
  arr.push(new Token(p,x+(i%2)*50,y+Math.floor(i/2)*50,color))
 }
 return arr
}

game.players=[
 makePlayer(0,"red",[80,80]),
 makePlayer(1,"green",[420,80]),
 makePlayer(2,"yellow",[420,420]),
 makePlayer(3,"blue",[80,420])
]

// -------- BLOCKADE --------
function isBlockade(pos,player){
 let tokens=ALL_TOKENS.filter(t=>t.pos===pos)
 return tokens.length>=2 &&
        tokens.every(t=>t.p===tokens[0].p) &&
        tokens[0].p!==player
}

// -------- VALID MOVE --------
function canMove(t,dice){
 let pos=t.pos

 if(pos===-1) return dice===6

 for(let i=0;i<dice;i++){
  let next=(pos+1)%TRACK.length
  if(isBlockade(next,t.p)) return false
  pos=next
 }

 return true
}

// -------- CAPTURE --------
function captureAt(pos,mover){
 let tokens=ALL_TOKENS.filter(t=>t.pos===pos && t!==mover)

 // ONLY capture if single
 if(tokens.length===1 && tokens[0].p!==mover.p){
  tokens[0].pos=-1
  tokens[0].update()
 }
}

// -------- MOVE --------
function move(t,isAI){
 if(t.p!==game.turn||game.dice===0) return

 if(!canMove(t,game.dice)){
  finishTurn()
  return
 }

 if(t.pos===-1){
  if(game.dice===6){
    t.pos=START[t.p]
    t.update()
    captureAt(t.pos,t)
  }else{
    finishTurn()
    return
  }
 }else{
  t.pos=(t.pos+game.dice)%TRACK.length
  t.update()
  captureAt(t.pos,t)
 }

 finishTurn()
}

// -------- ROLL --------
function rollDice(){
 if(game.dice!==0) return

 game.dice=Math.floor(Math.random()*6)+1
 diceEl.innerText=game.dice

 let tokens=game.players[game.turn]

 let valid=tokens.some(t=>canMove(t,game.dice))

 if(!valid){
  finishTurn()
  return
 }

 if(PLAYER_TYPES[game.turn]==="ai"){
  setTimeout(aiPlay,200)
 }
}

// -------- TURN --------
function finishTurn(){
 let last=game.dice
 game.dice=0

 if(last!==6){
  game.turn=(game.turn+1)%4
 }

 turnEl.innerText="Player "+(game.turn+1)

 if(PLAYER_TYPES[game.turn]==="ai"){
  setTimeout(rollDice,200)
 }
}

// -------- AI --------
function aiPlay(){
 let tokens=game.players[game.turn]

 let valid=tokens.filter(t=>canMove(t,game.dice))

 if(valid.length===0){
  finishTurn()
  return
 }

 let choice=valid[Math.floor(Math.random()*valid.length)]
 move(choice,true)
}

</script>

</body>
</html>
