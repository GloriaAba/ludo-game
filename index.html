<!DOCTYPE html>
<html>
<head>
<title>Ludo Board (Blockade Added)</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  gap:40px;
}

.wrapper{
  position:relative;
  width:600px;
  height:600px;
}

#board{
  display:grid;
  grid-template-columns:repeat(15,40px);
  grid-template-rows:repeat(15,40px);
}

.cell{
  width:40px;
  height:40px;
  border:1px solid #333;
  background:#eee;
}

.red-base{background:#e74c3c}
.green-base{background:#27ae60}
.blue-base{background:#3498db}
.yellow-base{background:#f1c40f}

.red-home{background:#ff6b6b}
.green-home{background:#6bff95}
.blue-home{background:#6bcfff}
.yellow-home{background:#fff36b}

.safe{
  background:#aaa !important;
}

.center{
  background:#222;
}

.token{
  width:22px;
  height:22px;
  border-radius:50%;
  position:absolute;
  border:2px solid white;
  cursor:pointer;
}

.panel{
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
</style>
</head>

<body>

<div class="wrapper">
  <div id="board"></div>
</div>

<div class="panel">
  <button onclick="rollDice()">🎲 Roll</button>
  <h2 id="dice">-</h2>
  <h3 id="turn">Player 1</h3>
</div>

<script>
const board=document.getElementById("board")
const diceEl=document.getElementById("dice")
const turnEl=document.getElementById("turn")

// BUILD BOARD
for(let r=0;r<15;r++){
 for(let c=0;c<15;c++){
  let div=document.createElement("div")
  div.className="cell"

  if(r<6 && c<6) div.classList.add("red-base")
  else if(r<6 && c>8) div.classList.add("green-base")
  else if(r>8 && c<6) div.classList.add("blue-base")
  else if(r>8 && c>8) div.classList.add("yellow-base")

  else if(c===7 && r>=1 && r<=5) div.classList.add("red-home")
  else if(r===7 && c>=9 && c<=13) div.classList.add("green-home")
  else if(c===7 && r>=9 && r<=13) div.classList.add("blue-home")
  else if(r===7 && c>=1 && c<=5) div.classList.add("yellow-home")

  if(r>=6 && r<=8 && c>=6 && c<=8){
    div.classList.add("center")
  }

  board.appendChild(div)
 }
}

// TRACK
const TRACK=[ [6,1],[6,2],[6,3],[6,4],[6,5],[5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
[0,7],[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[6,9],[6,10],[6,11],[6,12],[6,13],[6,14],
[7,14],[8,14],[8,13],[8,12],[8,11],[8,10],[8,9],
[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],
[14,7],[14,6],[13,6],[12,6],[11,6],[10,6],[9,6],
[8,5],[8,4],[8,3],[8,2],[8,1],[8,0],
[7,0],[6,0] ]

const START=[0,13,26,39]

// SAFE SQUARES
const SAFE=[0,8,13,21,26,34,39,47]

SAFE.forEach(i=>{
 let [r,c]=TRACK[i]
 board.children[r*15+c].classList.add("safe")
})

function px(r,c){return[c*40+9,r*40+9]}

// TOKENS
let ALL_TOKENS=[]

class Token{
 constructor(p,x,y,color){
  this.p=p
  this.pos=-1

  this.el=document.createElement("div")
  this.el.className="token"
  this.el.style.background=color
  document.querySelector(".wrapper").appendChild(this.el)

  this.start=[x,y]
  this.update()

  this.el.onclick=()=>move(this)

  ALL_TOKENS.push(this)
 }

 update(){
  if(this.pos===-1){
    this.el.style.left=this.start[0]+"px"
    this.el.style.top=this.start[1]+"px"
  }else{
    let [r,c]=TRACK[this.pos]
    let [x,y]=px(r,c)
    this.el.style.left=x+"px"
    this.el.style.top=y+"px"
  }
 }
}

// GAME
const game={players:[],turn:0,dice:0}

function init(){
 game.players=[
  makePlayer(0,"red",[80,80]),
  makePlayer(1,"green",[480,80]),
  makePlayer(2,"yellow",[480,480]),
  makePlayer(3,"blue",[80,480])
 ]
}

function makePlayer(p,color,[x,y]){
 let arr=[]
 for(let i=0;i<4;i++){
  arr.push(new Token(p,x+(i%2)*50,y+Math.floor(i/2)*50,color))
 }
 return arr
}

init()

function sendHome(token){
 token.pos=-1
 token.update()
}

// 🔥 BLOCKADE FUNCTION
function isBlocked(pos, movingPlayer){
 let tokensAtPos = ALL_TOKENS.filter(t => t.pos === pos);

 if(tokensAtPos.length < 2) return false;

 let owner = tokensAtPos[0].p;

 if(tokensAtPos.every(t => t.p === owner)){
  return owner !== movingPlayer;
 }

 return false;
}

// CAPTURE
function checkCapture(movingToken){
 if(SAFE.includes(movingToken.pos)) return

 ALL_TOKENS.forEach(other=>{
  if(other === movingToken) return

  if(other.pos === movingToken.pos){
    if(other.p === movingToken.p) return
    sendHome(other)
  }
 })
}

// TURN
function finishTurn(){
 if(game.dice!==6){
  game.turn=(game.turn+1)%4
 }
 game.dice=0
 turnEl.innerText="Player "+(game.turn+1)
}

// DICE
function rollDice(){
 if(game.dice!==0)return

 game.dice=Math.floor(Math.random()*6)+1
 diceEl.innerText=game.dice

 let player=game.players[game.turn]
 let hasToken=player.some(t=>t.pos!==-1)

 if(game.dice!==6 && !hasToken){
  setTimeout(()=>finishTurn(),600)
 }
}

// MOVE
async function move(t){
 if(t.p!==game.turn || game.dice===0)return

 if(t.pos===-1){
  if(game.dice===6){
    t.pos=START[t.p]
    t.update()
    checkCapture(t)
  }
 }else{
  for(let i=0;i<game.dice;i++){

    let nextPos = (t.pos + 1) % TRACK.length;

    // 🚫 BLOCKED
    if(isBlocked(nextPos, t.p)){
      break;
    }

    t.pos = nextPos;
    t.update();

    await new Promise(r=>setTimeout(r,100));
  }

  checkCapture(t)
 }

 finishTurn()
}
</script>

</body>
</html>
