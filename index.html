<!DOCTYPE html>
<html>
<head>
<title>Ludo Online (Realtime)</title>

<style>
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  gap:40px;
}

.wrapper{
  position:relative;
  width:600px;
  height:600px;
}

#board{
  display:grid;
  grid-template-columns:repeat(15,40px);
  grid-template-rows:repeat(15,40px);
}

.cell{
  width:40px;
  height:40px;
  border:1px solid #333;
  background:#eee;
}

.center{background:#222;}

.token{
  width:22px;
  height:22px;
  border-radius:50%;
  position:absolute;
  border:2px solid white;
}

.active{box-shadow:0 0 15px white;}
.inactive{opacity:0.4;}

.panel{color:white;}
</style>
</head>

<body>

<div class="wrapper">
  <div id="board"></div>
</div>

<div class="panel">
  <button onclick="rollDice()">🎲 Roll</button>
  <h2 id="dice">-</h2>
  <h3 id="turn">Loading...</h3>
</div>

<script type="module">

// 🔥 IMPORT FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 YOUR FIREBASE CONFIG (REPLACE THIS)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 ROOM
const roomId = "ludo-room-1";
const gameRef = ref(db, "games/" + roomId);

// ---------------- UI ----------------
const board=document.getElementById("board")
const diceEl=document.getElementById("dice")
const turnEl=document.getElementById("turn")

const COLORS=["Red","Green","Yellow","Blue"]

// ---------------- BOARD ----------------
for(let r=0;r<15;r++){
 for(let c=0;c<15;c++){
  let div=document.createElement("div")
  div.className="cell"
  if(r>=6 && r<=8 && c>=6 && c<=8) div.classList.add("center")
  board.appendChild(div)
 }
}

// ---------------- TRACK ----------------
const TRACK=[
[6,1],[6,2],[6,3],[6,4],[6,5],[5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
[0,7],[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[6,9],[6,10],[6,11],[6,12],[6,13],[6,14],
[7,14],[8,14],[8,13],[8,12],[8,11],[8,10],[8,9],
[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],
[14,7],[14,6],[13,6],[12,6],[11,6],[10,6],[9,6],
[8,5],[8,4],[8,3],[8,2],[8,1],[8,0],
[7,0],[6,0]
]

const START=[0,13,26,39]

function px(r,c){return[c*40+9,r*40+9]}

// ---------------- TOKENS ----------------
let ALL_TOKENS=[]

class Token{
 constructor(p,x,y,color){
  this.p=p
  this.pos=-1

  this.el=document.createElement("div")
  this.el.className="token"
  this.el.style.background=color
  document.querySelector(".wrapper").appendChild(this.el)

  this.start=[x,y]
  this.update()

  ALL_TOKENS.push(this)
 }

 update(){
  if(this.pos===-1){
    this.el.style.left=this.start[0]+"px"
    this.el.style.top=this.start[1]+"px"
  }else{
    let [r,c]=TRACK[this.pos]
    let [x,y]=px(r,c)
    this.el.style.left=x+"px"
    this.el.style.top=y+"px"
  }
 }
}

// INIT TOKENS
function createTokens(){
 let positions=[[80,80],[480,80],[480,480],[80,480]]
 let colors=["red","green","yellow","blue"]

 for(let p=0;p<4;p++){
  for(let i=0;i<4;i++){
    new Token(p,
      positions[p][0]+(i%2)*50,
      positions[p][1]+Math.floor(i/2)*50,
      colors[p]
    )
  }
 }
}

createTokens()

// ---------------- STATE ----------------
let game={turn:0,dice:0}

// ---------------- FIREBASE SYNC ----------------

// listen for updates
onValue(gameRef, snapshot=>{
 let data=snapshot.val()
 if(!data) return

 game.turn=data.turn
 game.dice=data.dice

 diceEl.innerText=data.dice
 turnEl.innerText=COLORS[game.turn]+" Player"

 data.tokens.forEach((t,i)=>{
  ALL_TOKENS[i].pos=t.pos
  ALL_TOKENS[i].update()
 })
})

// save state
function saveGame(){
 set(gameRef,{
  turn:game.turn,
  dice:game.dice,
  tokens:ALL_TOKENS.map(t=>({p:t.p,pos:t.pos}))
 })
}

// ---------------- GAME LOGIC ----------------

// roll dice
window.rollDice=function(){
 if(game.dice!==0) return

 game.dice=Math.floor(Math.random()*6)+1
 saveGame()
}

// move token
window.moveToken=function(index){
 if(game.dice===0) return

 let t=ALL_TOKENS[index]

 if(t.pos===-1){
  if(game.dice===6){
    t.pos=START[t.p]
  }else{
    nextTurn()
    return
  }
 }
 else{
  t.pos=(t.pos+game.dice)%TRACK.length
 }

 nextTurn()
}

// next turn
function nextTurn(){
 let last=game.dice

 if(last!==6){
  game.turn=(game.turn+1)%4
 }

 game.dice=0
 saveGame()
}

</script>

</body>
</html>
